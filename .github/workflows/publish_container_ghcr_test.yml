---
name: Publish personal test container to GHCR

"on":
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-ghcr-test:
    name: Build and publish personal test image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/luiskuhn/nuxnet-inference-test
    steps:
      - name: Check out source-code repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:test
